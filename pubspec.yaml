name: etkinlik_app
description: Etkinlik Bilet ve Katılım Sistemi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Navigasyon
  go_router: ^14.2.0

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Utility
  intl: ^0.19.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true